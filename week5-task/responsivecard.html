<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Responsive Cards + Dark Mode + Spinner</title>

    <link rel="stylesheet" href="responsivecard.css" />
</head>
<body>

  <div class="top-bar">
    <h1>Responsive Cards</h1>
    <button class="btn" onclick="toggleDark()">Toggle Dark Mode</button>
  </div>
  <div class="spinner"></div>
  <div class="container">
    <div class="card">
      <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee" />
      <h2>Card 1</h2>
      <p>Responsive layout using CSS Grid.</p>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f" />
      <h2>Card 2</h2>
      <p>Hover and entrance animations included.</p>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085" />
      <h2>Card 3</h2>
      <p>Cards adapt to screen size automatically.</p>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1521737604893-d14cc237f11d" />
      <h2>Card 4</h2>
      <p>Dark mode with smooth transitions.</p>
    </div>
  </div>

  <script>
    function toggleDark() {
      document.body.classList.toggle('dark');
    }
  </script>

</body>
</html>
